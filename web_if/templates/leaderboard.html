<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Country Guessing Game - Leaderboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>COUNTRY GUESSING GAME</h1>
            <p>LEADERBOARD</p>
        </header>

        <div class="leaderboard-container">
            <div class="leaderboard-row leaderboard-header">
                <div>RANK</div>
                <div>USER</div>
                <div>SCORE</div>
                <div>ACCURACY</div>
                <div>LOGIN</div>
                <div>WALLET</div>
                <div>LANG</div>
            </div>

            <div id="leaderboard-content">
                <!-- Leaderboard data will be loaded here -->
                <p id="leaderboard-loading">Loading leaderboard data...</p>
            </div>
        </div>

        <div class="nav-bar">
            <a href="{{ url_for('index') }}" class="button">MENU</a>
            <a href="{{ url_for('game', mode='map') }}" class="button">PLAY GAME</a>
        </div>
    </div>

    <div class="version">
        Bot Version: {{ version }}
    </div>

    <script>
        // Fetch leaderboard data when the page loads
        document.addEventListener('DOMContentLoaded', function() {
            fetchLeaderboard();
        });

        // Function to fetch leaderboard data from the API
        function fetchLeaderboard() {
            console.log('Fetching leaderboard data...');

            fetch('/api/leaderboard')
                .then(response => {
                    console.log('Response status:', response.status);
                    if (!response.ok) {
                        throw new Error('Network response was not ok: ' + response.status);
                    }
                    return response.json();
                })
                .then(data => {
                    console.log('Leaderboard data received:', data);
                    if (data.leaderboard) {
                        displayLeaderboard(data.leaderboard);
                    } else {
                        throw new Error('Invalid data format');
                    }
                })
                .catch(error => {
                    console.error('Error fetching leaderboard:', error);
                    document.getElementById('leaderboard-loading').textContent = 
                        'Sorry, there was an error displaying the leaderboard. ' + error.message;
                });
        }

        // Function to display leaderboard data
        function displayLeaderboard(leaderboardData) {
            const container = document.getElementById('leaderboard-content');

            // Clear loading message
            container.innerHTML = '';

            if (!leaderboardData || leaderboardData.length === 0) {
                container.innerHTML = '<p>No games have been played yet. Be the first to play!</p>';
                return;
            }

            // Add each leaderboard entry
            leaderboardData.forEach(entry => {
                const row = document.createElement('div');
                row.className = 'leaderboard-row';

                row.innerHTML = `
                    <div>${entry.rank || '-'}</div>
                    <div>${entry.name || 'Anonymous'}</div>
                    <div>${entry.score || 0}</div>
                    <div>${entry.accuracy || 0}%</div>
                    <div>${entry.login_method || 'telegram'}</div>
                    <div>${entry.wallet_addr || '0xtele'}</div>
                    <div>${entry.language || 'En'}</div>
                `;

                container.appendChild(row);
            });
        }
    </script>
</body>
</html>
