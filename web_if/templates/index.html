<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Country Guessing Game</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <style>
        /* Inline styles for preview purposes - would be moved to main.css in implementation */
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #1e5799 0%,#207cca 30%,#2989d8 50%,#7db9e8 100%);
            color: #fff;
            min-height: 100vh;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            text-align: center;
            padding: 20px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
        }
        
        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .button-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin: 30px 0;
        }
        
        .button {
            background-color: rgba(255, 255, 255, 0.2);
            border: 2px solid white;
            border-radius: 8px;
            color: white;
            padding: 15px 20px;
            text-align: center;
            text-decoration: none;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .button:hover {
            background-color: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }
        
        .login-buttons {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 50px;
        }
        
        .guest-button {
            background-color: rgba(0, 150, 0, 0.6);
        }
        
        .wallet-button {
            background-color: rgba(150, 0, 150, 0.6);
        }
        
        .version {
            position: fixed;
            bottom: 10px;
            right: 10px;
            font-size: 12px;
            opacity: 0.8;
        }
        
        @media (max-width: 600px) {
            .button-container, .login-buttons {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>COUNTRY GUESSING GAME</h1>
            <p>Test your geography knowledge with fun interactive games!</p>
        </header>
        
        <div class="button-container">
            <a href="{{ url_for('help_page') }}" class="button">HELP</a>
            <a href="{{ url_for('leaderboard') }}" class="button">LEADERBOARD</a>
            
            <a href="{{ url_for('game', mode='map') }}" class="button">GAME MAP</a>
            <a href="{{ url_for('game', mode='flag') }}" class="button">GAME FLAG</a>
            
            <a href="{{ url_for('game', mode='capital') }}" class="button">GAME CAP</a>
        </div>
        
        <div class="login-buttons">
            <a href="javascript:createGuestSession()" class="button guest-button">PLAY AS GUEST</a>
            <a href="javascript:connectWallet()" class="button wallet-button">CONNECT WALLET</a>
        </div>
    </div>
    
    <div class="version">
        Bot Version: {{ version }}
    </div>
    
    <script>
        // Simple JavaScript functions for demonstration
        function createGuestSession() {
            fetch('/api/user/guest', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                }
            })
            .then(response => response.json())
            .then(data => {
                console.log('Created guest session:', data);
                window.location.href = "{{ url_for('game', mode='map') }}";
            });
        }
        
        function connectWallet() {
            alert('Wallet connection will be implemented in a future update');
            // This would be replaced with actual wallet connection code
        }
    </script>
</body>
</html>
