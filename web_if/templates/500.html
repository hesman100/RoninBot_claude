<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Error - Country Guessing Game</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>COUNTRY GUESSING GAME</h1>
        </header>
        
        <div class="game-container">
            <h2>500 - Server Error</h2>
            <p>Sorry, something went wrong on our end.</p>
            <p>Our geography experts are working to fix the issue.</p>
            
            <div class="button-container" style="margin-top: 30px;">
                <a href="{{ url_for('index') }}" class="button">RETURN TO HOME</a>
                <a href="javascript:location.reload()" class="button">TRY AGAIN</a>
            </div>
        </div>
    </div>
    
    <div class="version">
        Bot Version: {{ version }}
    </div>
</body>
</html>
