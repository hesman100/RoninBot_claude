<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="400" height="200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="200" fill="#1C2333"/>
  
  <!-- Always On Panel -->
  <rect x="20" y="20" width="360" height="160" rx="10" fill="#2B3245"/>
  
  <!-- Header -->
  <text x="40" y="50" font-family="Arial" font-size="18" fill="white">Always On</text>
  
  <!-- Description -->
  <text x="40" y="80" font-family="Arial" font-size="12" fill="#9BA3B0">Keep your Repl running even after you close the browser</text>
  
  <!-- Toggle Switch -->
  <rect x="40" y="100" width="60" height="30" rx="15" fill="#4CAF50"/>
  <circle cx="85" cy="115" r="12" fill="white"/>
  
  <!-- Status Text -->
  <text x="120" y="120" font-family="Arial" font-size="14" fill="#4CAF50">Enabled</text>
</svg>
